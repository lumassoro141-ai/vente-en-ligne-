<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ShopPro - SAMI Boutique en ligne</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🛍 ShopPro</h1>
    <div class="cart">
        🛒 Panier (<span id="cart-count">0</span>)
    </div>
</header>

<section class="products">

    <div class="product">
        <img src="https://source.unsplash.com/300x300/?shoes" alt="Chaussures">
        <h3>Chaussures Sport</h3>
        <p>45 000 FCFA</p>
        <button class="btn-square" onclick="addToCart()">Ajouter</button>
    </div>

    <div class="product">
        <img src="https://source.unsplash.com/300x300/?watch" alt="Montre">
        <h3>Montre Luxe</h3>
        <p>120 000 FCFA</p>
        <button class="btn-round" onclick="addToCart()">Ajouter</button>
    </div>

    <div class="product">
        <img src="https://source.unsplash.com/300x300/?smartphone" alt="Téléphone">
        <h3>Smartphone Pro</h3>
        <p>350 000 FCFA</p>
        <button class="btn-square" onclick="addToCart()">Ajouter</button>
    </div>

    <div class="product">
        <img src="https://source.unsplash.com/300x300/?headphones" alt="Casque">
        <h3>Casque Bluetooth</h3>
        <p>30 000 FCFA</p>
        <button class="btn-round" onclick="addToCart()">Ajouter</button>
    </div>

</section>

<script src="script.js"></script>
</body>
</html>
